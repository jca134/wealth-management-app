<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${goal.goalId} == null ? 'Add Goal' : 'Edit Goal'">Goal</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<h1 th:text="${goal.goalId} == null ? 'Add Goal' : 'Edit Goal'">Goal</h1>

<form class="entity-form" th:action="@{/financial-goals/save}" th:object="${goal}" method="post">
    <input type="hidden" th:field="*{goalId}">

    <label>Client
        <select th:field="*{clientId}" required>
            <option value="">-- Select client --</option>
            <option th:each="c : ${clients}" th:value="${c.clientId}" th:text="${c.name}"></option>
        </select>
    </label>

    <label>Type
        <input type="text" th:field="*{goalType}" required>
    </label>

    <label>Target Amount
        <input type="number" step="0.01" th:field="*{targetAmount}" required>
    </label>

    <label>Current Amount
        <input type="number" step="0.01" th:field="*{currentAmount}">
    </label>

    <label>Target Date
        <input type="date" th:field="*{targetDate}">
    </label>

    <label>Priority
        <select th:field="*{priority}">
            <option value="">-- Select --</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>
    </label>

    <div class="form-actions">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn" th:href="@{/financial-goals}">Cancel</a>
    </div>
</form>
</body>
</html>
