<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Advisors</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<h1>Advisors</h1>

<p><a class="btn btn-primary" th:href="@{/advisors/new}">Add Advisor</a></p>

<table>
    <thead>
    <tr>
        <th>Advisor ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Office</th>
        <th>Hire Date</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="advisor : ${advisors}">
        <td th:text="${advisor.advisorId}"></td>
        <td th:text="${advisor.name}"></td>
        <td th:text="${advisor.email}"></td>
        <td th:text="${advisor.phone}"></td>
        <td th:text="${advisor.officeLocation}"></td>
        <td th:text="${advisor.hireDate}"></td>
        <td class="actions">
            <a class="btn" th:href="@{/advisors/edit/{id}(id=${advisor.advisorId})}">Edit</a>
            <form th:action="@{/advisors/delete/{id}(id=${advisor.advisorId})}" method="post"
                  onsubmit="return confirm('Delete this advisor?');">
                <button class="btn btn-danger" type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
