<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clients</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1, h2 {
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 30px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        form {
            margin-top: 10px;
        }

        label {
            display: inline-block;
            width: 120px;
            margin-bottom: 10px;
        }

        input {
            padding: 6px;
            width: 250px;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }

        .action-form {
            display: inline;
            margin-right: 8px;
        }

        .edit-link {
            margin-right: 10px;
        }
    </style>
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<h1>Clients</h1>

<p><a class="btn btn-primary" th:href="@{/clients/new}">Add Client</a></p>

<table>
    <thead>
    <tr>
        <th>Client ID</th>
        <th>Client Name</th>
        <th>Email</th>
        <th>Advisor Name</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="client : ${clients}">
        <td th:text="${client.clientId}"></td>
        <td th:text="${client.clientName}"></td>
        <td th:text="${client.email}"></td>
        <td th:text="${client.advisorName}"></td>
        <td class="actions">
            <a class="btn" th:href="@{/clients/edit/{id}(id=${client.clientId})}">Edit</a>
            <form th:action="@{/clients/delete/{id}(id=${client.clientId})}" method="post"
                  onsubmit="return confirm('Delete this client?');">
                <button class="btn btn-danger" type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
