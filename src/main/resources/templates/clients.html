<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clients</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<h1>Clients</h1>

<p><a class="btn btn-primary" th:href="@{/clients/new}">Add Client</a></p>

<div class="search-bar">
    <input type="search" placeholder="Search id, name, email, advisor..."
           data-search-target="#clients-table" data-search-role="text">
</div>

<table id="clients-table">
    <thead>
    <tr>
        <th>Client ID</th>
        <th>Client Name</th>
        <th>Email</th>
        <th>Advisor Name</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="client : ${clients}">
        <td th:text="${client.clientId}"></td>
        <td th:text="${client.clientName}"></td>
        <td th:text="${client.email}"></td>
        <td th:text="${client.advisorName}"></td>
        <td class="actions">
            <a class="btn" th:href="@{/clients/edit/{id}(id=${client.clientId})}">Edit</a>
            <form th:action="@{/clients/delete/{id}(id=${client.clientId})}" method="post"
                  onsubmit="return confirm('Delete this client?');">
                <button class="btn btn-danger" type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
<script th:src="@{/js/table-search.js}"></script>
</body>
</html>
