<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${transaction.txnId} == null ? 'Add Transaction' : 'Edit Transaction'">Transaction</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav th:replace="~{fragments/nav :: topnav}"></nav>

<h1 th:text="${transaction.txnId} == null ? 'Add Transaction' : 'Edit Transaction'">Transaction</h1>

<form class="entity-form" th:action="@{/transactions/save}" th:object="${transaction}" method="post">
    <input type="hidden" th:field="*{txnId}">

    <label>Account
        <select th:field="*{accountId}" required>
            <option value="">-- Select account --</option>
            <option th:each="a : ${accounts}" th:value="${a.accountId}" th:text="${a.label}"></option>
        </select>
    </label>

    <label>Symbol
        <select th:field="*{symbol}" required>
            <option value="">-- Select symbol --</option>
            <option th:each="s : ${assets}" th:value="${s.symbol}"
                    th:text="${s.symbol} + ' — ' + ${s.assetName}"></option>
        </select>
    </label>

    <label>Type
        <select th:field="*{txnType}" required>
            <option value="">-- Select type --</option>
            <option value="BUY">BUY</option>
            <option value="SELL">SELL</option>
            <option value="DIVIDEND">DIVIDEND</option>
            <option value="FEE">FEE</option>
        </select>
    </label>

    <label>Quantity
        <input type="number" step="0.0001" th:field="*{quantity}" required>
    </label>

    <label>Price per Unit
        <input type="number" step="0.0001" th:field="*{pricePerUnit}" required>
    </label>

    <label>Fees
        <input type="number" step="0.01" th:field="*{fees}">
    </label>

    <label>Trade Date
        <input type="date" th:field="*{tradeDate}" required>
    </label>

    <label>Settle Date
        <input type="date" th:field="*{settleDate}">
    </label>

    <div class="form-actions">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn" th:href="@{/transactions}">Cancel</a>
    </div>
</form>
</body>
</html>
